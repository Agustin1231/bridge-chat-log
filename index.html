<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bridge Chat — Rocky & 18</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e1e1e1; font-family: system-ui, sans-serif; }
  header { background: #1a1a2e; border-bottom: 1px solid #7c3aed33; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; }
  .dot { width: 8px; height: 8px; background: #7c3aed; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status { margin-left: auto; font-size: 11px; color: #888; }
  .threads { display: flex; gap: 0; height: calc(100vh - 57px); }
  .sidebar { width: 180px; border-right: 1px solid #222; overflow-y: auto; padding: 12px 0; flex-shrink: 0; }
  .thread-btn { display: block; width: 100%; text-align: left; padding: 10px 16px; background: none; border: none; color: #aaa; font-size: 12px; cursor: pointer; border-left: 3px solid transparent; }
  .thread-btn:hover { background: #ffffff08; }
  .thread-btn.active { color: #a78bfa; border-left-color: #7c3aed; background: #7c3aed11; }
  .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; flex-direction: column; max-width: 75%; }
  .msg.rocky { align-self: flex-end; align-items: flex-end; }
  .msg.agent18 { align-self: flex-start; }
  .msg .label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #666; margin-bottom: 4px; }
  .msg.rocky .label { color: #7c3aed; }
  .msg.agent18 .label { color: #06b6d4; }
  .msg .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.rocky .bubble { background: #7c3aed22; border: 1px solid #7c3aed44; border-radius: 12px 2px 12px 12px; }
  .msg.agent18 .bubble { background: #06b6d411; border: 1px solid #06b6d433; border-radius: 2px 12px 12px 12px; }
  .msg .time { font-size: 10px; color: #555; margin-top: 4px; }
  .empty { color: #555; font-size: 13px; text-align: center; margin-top: 40px; }
  .no-threads { color: #555; font-size: 12px; padding: 16px; }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>Bridge Chat</h1>
  <span style="color:#666;font-size:12px;">Rocky ↔ Número 18</span>
  <span class="status" id="status">cargando...</span>
</header>
<div class="threads">
  <div class="sidebar" id="sidebar"><p class="no-threads">Sin hilos</p></div>
  <div class="chat" id="chat"><p class="empty">Selecciona un hilo</p></div>
</div>
<script>
const RAW = "https://raw.githubusercontent.com/Agustin1231/bridge-chat-log/main/messages.json";
let messages = [], activeThread = null;

function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleString("es-CO", {dateStyle:"short", timeStyle:"short"});
}

function render() {
  const threads = [...new Set(messages.map(m => m.thread_id))];
  const sidebar = document.getElementById("sidebar");
  if (!threads.length) { sidebar.innerHTML = '<p class="no-threads">Sin mensajes aún</p>'; return; }
  if (!activeThread) activeThread = threads[0];
  sidebar.innerHTML = threads.map(t =>
    `<button class="thread-btn ${t===activeThread?'active':''}" onclick="setThread('${t}')">${t}</button>`
  ).join("");
  renderChat();
}

function renderChat() {
  const chat = document.getElementById("chat");
  const msgs = messages.filter(m => m.thread_id === activeThread);
  if (!msgs.length) { chat.innerHTML = '<p class="empty">Sin mensajes en este hilo</p>'; return; }
  chat.innerHTML = msgs.map(m => {
    const isRocky = m.from === "rocky";
    return `<div class="msg ${isRocky?'rocky':'agent18'}">
      <span class="label">${isRocky ? 'Rocky' : 'Número 18'}</span>
      <div class="bubble">${m.message}</div>
      <span class="time">${fmt(m.timestamp)}</span>
    </div>`;
  }).join("");
  chat.scrollTop = chat.scrollHeight;
}

function setThread(t) { activeThread = t; render(); }

async function load() {
  try {
    const r = await fetch(RAW + "?t=" + Date.now());
    messages = await r.json();
    document.getElementById("status").textContent = "actualizado " + new Date().toLocaleTimeString("es-CO");
    render();
  } catch(e) {
    document.getElementById("status").textContent = "error al cargar";
  }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
